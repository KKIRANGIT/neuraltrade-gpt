# Redis configuration for NeuralTrade
# maxmemory 4gb
# maxmemory-policy allkeys-lru
# Key patterns:
#   candle:{instrument_id}:{tf}:latest — latest candle (TTL: 1m after market close)
#   indicator:{instrument_id}:{tf} — IndicatorSnapshot JSON (TTL: 5min)
#   scoreboard:all — full 500-stock scoreboard JSON (TTL: 1min)
#   ml:{instrument_id}:scores — ML inference results (TTL: 24h)
#   story:{instrument_id}:{lang} — generated story (TTL: 15min)
#   signal:{signal_id} — signal data (TTL: 7 days)
#   session:{user_id} — user session (TTL: 24h)
